apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: order-worker-sqs
  namespace: olive-dev
spec:
  scaleTargetRef:
    name: order-worker

  pollingInterval: 15
  cooldownPeriod: 180

  minReplicaCount: 1
  maxReplicaCount: 60

  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 180
          policies:
            - type: Percent
              value: 50
              periodSeconds: 60
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Pods
              value: 4
              periodSeconds: 60

  triggers:
    - type: aws-sqs-queue
      authenticationRef:
        name: aws-irsa
      metadata:
        awsRegion: ap-northeast-2
        queueURL: https://sqs.ap-northeast-2.amazonaws.com/065227443107/olive-dev-order-queue
        queueLength: "50"
        activationQueueLength: "5"
        identityOwner: operator

    # BEGIN: calendar-managed-cron
    - type: cron
      metadata:
        timezone: "Asia/Seoul"
        start: "0 0 1 1 *"
        end:   "1 0 1 1 *"
        desiredReplicas: "1"
    # END: calendar-managed-cron
