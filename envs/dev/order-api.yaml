apiVersion: v1
kind: Namespace
metadata:
  name: olive-dev
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-api
  namespace: olive-dev
  labels:
    app: order-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-api
  template:
    metadata:
      labels:
        app: order-api
    spec:
      serviceAccountName: order-api
      containers:
        - name: order-api
          image: 065227443107.dkr.ecr.ap-northeast-2.amazonaws.com/olive/order-api:dev-20260128-100113
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: aurora-cred
          env:
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: DD_TRACE_AGENT_PORT
              value: "8126"

            - name: DD_SERVICE
              value: "order-api"
            - name: DD_ENV
              value: "dev"
            - name: DD_VERSION
              value: "1.0.0"

            - name: DD_LOGS_INJECTION
              value: "true"
            - name: DD_TRACE_SAMPLE_RATE
              value: "1"
            
            - name: ENV
              value: "dev"
            - name: SERVICE_NAME
              value: "order-api"

            - name: AWS_REGION
              value: ap-northeast-2
            - name: ORDER_QUEUE_URL
              value: "https://sqs.ap-northeast-2.amazonaws.com/065227443107/olive-dev-order-queue"
            - name: PORT
              value: "8080"
            - name: ORIGIN_HEADER_VALUE
              value: "olive-dev-only-9f3a2c"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: order-api
  namespace: olive-dev
spec:
  type: ClusterIP
  selector:
    app: order-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
