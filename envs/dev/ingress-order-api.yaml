apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: order-api
  namespace: olive-dev
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip

    # 80 + 443
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-northeast-2:065227443107:certificate/53a03c86-f248-4736-bfc2-5edd3faa315a
    alb.ingress.kubernetes.io/ssl-redirect: "443"

    # ✅ CloudFront Origin-facing Prefix List만 허용 (pl-22a6434b가 로그에 찍힌 그거)
    alb.ingress.kubernetes.io/inbound-prefix-lists: "pl-22a6434b"

    # healthcheck
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
    alb.ingress.kubernetes.io/success-codes: "200"
spec:
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: order-api
                port:
                  number: 80
