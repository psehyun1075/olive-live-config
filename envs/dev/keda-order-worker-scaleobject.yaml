apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: order-worker-sqs
  namespace: olive-dev
spec:
  scaleTargetRef:
    name: order-worker

  pollingInterval: 30
  cooldownPeriod: 60
  minReplicaCount: 1
  maxReplicaCount: 10

  triggers:
    - type: aws-sqs-queue
      authenticationRef:
        name: aws-irsa
      metadata:
        queueURL: "https://sqs.ap-northeast-2.amazonaws.com/065227443107/olive-dev-order-queue"
        awsRegion: "ap-northeast-2"
        queueLength: "5"

